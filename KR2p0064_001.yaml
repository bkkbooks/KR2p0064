body:
  text: 王笑如我得免後之人何若答曰臣弗知競平王命王子木至城父過申煮食於搜城公幹遇跪於疇中王子問城公此何城公答曰疇王子曰疇何以為曰以種麻王子曰何以麻為答曰以為衣城公起曰臣將有告吾先君莊王至河淮之行煮食於搜醢不爨王曰不盍先君知不盍醢不爨王子不知麻王子不得君楚邦或不得臣楚邦志書乃言
